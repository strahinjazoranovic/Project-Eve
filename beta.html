<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Eve</title>
    <link rel="icon" href="img/spaceshuttle.png" type="image/icon type">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

    <div id="gamebuttons">
        <p
        style="position: fixed; z-index: 10; color: white; left: 50px; top: 15px; margin: 0; font-size: 20px; font-family: monospace;">
        <span>Score:</span><span id="scoreEl">0</span>
        </p>

        <p
        style="position: fixed; z-index: 10; color: white; left: 200px; top: 15px; margin: 0; font-size: 20px; font-family: monospace;">
        <span>High Score:</span><span id="highScoreEl">0</span>
        </p>

        <p
        style="position: fixed; z-index: 10; color: white; left: 400px; top: 15px; margin: 0; font-size: 20px; font-family: monospace;">
        <span>Health: </span><span id="healthEl">4</span>
        </p>

        <p
        style="position: fixed; z-index: 10; color: white; left: 1200px; top: 15px; margin: 0; font-size: 20px; font-family: monospace;">
        <a href="home.html"><span>PROJECT EVE BETA</span></a>
        </p>

    </div>
    
    <div id="canvas">
        <canvas></canvas>
    </div>

    <div id="playMenu">
        <h1 id="titlemenu">Project Eve</h1>
        <h1 id="controls"> A to move left<br> D to move right <br>
            Space To Shoot!<br></h1>
        <h1 id="controls">Project EVE BETA to go back home!</h1>
        <h1 id="controls">Refresh the page to keep the canvas in frame!</h1>
        <button id="playButton">Play</button>
        <a href="home.html"><button id="backbutton">Back</button></a>
    </div>

    <div id="restartMenu">
        <h1 id="titlerestart">Project Eve</h1>
        <p>
        <span>Score:</span><span id="scoreEl"></span>
        </p>
        <a href="beta.html"><button id="restartButton">Restart</button></a>
        <a href="home.html"><button id="backbutton">Back Home</button></a>
    </div>
</body>
<script src="js/beta.js"></script>

</html>
